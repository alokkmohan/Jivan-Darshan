<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>जीवन दर्शन – सहयोग</title>
  <!-- v2 -->
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #7B1C1C 0%, #C9860A 60%, #FF6B00 100%);
      font-family: 'Noto Sans Devanagari', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
    }
    .om {
      font-size: 72px;
      animation: glow 3s ease-in-out infinite alternate;
      margin-bottom: 10px;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 8px #FFD700AA); }
      to   { filter: drop-shadow(0 0 28px #FF6B00CC); }
    }
    h1 {
      font-family: 'Tiro Devanagari Hindi', serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      color: #FFFDF7;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      margin-bottom: 6px;
    }
    .tagline {
      color: #FFE4A0;
      font-size: 0.95rem;
      font-style: italic;
      margin-bottom: 28px;
    }
    .msg {
      color: #FFFDF7;
      font-size: clamp(0.92rem, 3vw, 1.08rem);
      line-height: 1.75;
      max-width: 420px;
      margin-bottom: 32px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .donate-btn {
      display: inline-block;
      background: #FFFDF7;
      color: #7B1C1C;
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      padding: 20px 52px;
      border-radius: 60px;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
    }
    .donate-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(0,0,0,0.3);
    }
    .donate-btn:active { transform: scale(0.98); }
    .diya { margin-top: 36px; font-size: 26px; letter-spacing: 10px; }
    footer {
      margin-top: 24px;
      color: #FFE4A0;
      font-size: 0.72rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="om">🕉</div>
  <h1>जीवन दर्शन</h1>
  <p class="tagline">सेवा • भक्ति • ज्ञान</p>

  <p class="msg">
    यदि हमारे वीडियो आपको पसंद आते हैं,<br>
    हमारे काम की सराहना करना चाहते हैं<br>
    या हमें प्रोत्साहन देना चाहते हैं —<br>
    तो आप सहयोग कर सकते हैं।
  </p>

  <a class="donate-btn" href="https://razorpay.me/@dataimpact" target="_blank">
    🙏 Donation / दान
  </a>

  <div class="diya">🪔🌸🪔</div>
  <footer>सभी भुगतान सुरक्षित रूप से स्वीकार किए जाते हैं</footer>
</body>
</html>
