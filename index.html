<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>जीवन दर्शन – दान पेटी</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #7B1C1C 0%, #C9860A 60%, #FF6B00 100%);
      font-family: 'Noto Sans Devanagari', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .om {
      font-size: 80px;
      animation: glow 3s ease-in-out infinite alternate;
      margin-bottom: 12px;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 8px #FFD700AA); }
      to   { filter: drop-shadow(0 0 28px #FF6B00CC); }
    }
    h1 {
      font-family: 'Tiro Devanagari Hindi', serif;
      font-size: clamp(2rem, 7vw, 3.5rem);
      color: #FFFDF7;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      margin-bottom: 6px;
      text-align: center;
    }
    .tagline {
      color: #FFE4A0;
      font-size: 1rem;
      font-style: italic;
      margin-bottom: 40px;
    }
    .donate-btn {
      display: inline-block;
      background: #FFFDF7;
      color: #7B1C1C;
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      padding: 22px 56px;
      border-radius: 60px;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
    }
    .donate-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(0,0,0,0.3);
    }
    .donate-btn:active {
      transform: scale(0.98);
    }
    .diya { margin-top: 36px; font-size: 28px; letter-spacing: 10px; }
    footer {
      margin-top: 32px;
      color: #FFE4A0;
      font-size: 0.75rem;
      opacity: 0.8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="om">🕉</div>
  <h1>जीवन दर्शन</h1>
  <p class="tagline">सेवा • भक्ति • ज्ञान</p>

  <a class="donate-btn" href="https://razorpay.me/@dataimpact" target="_blank">
    🙏 दान करें
  </a>

  <div class="diya">🪔🌸🪔</div>
  <footer>सभी दान सुरक्षित रूप से स्वीकार किए जाते हैं</footer>
</body>
</html>
